name: CI

on:
  push:
    paths:
      - src/**
      - scripts/lib/**
      - bin/**
      - schemas/**
      - packages/**
      - package.json
      - tests/**
      - site/**
      - .github/workflows/**
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Prepublish Gate (push + manual) ────────────────────────────────────────
  prepublish-gate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Verify tarball contents
        run: |
          PACK=$(npm pack --dry-run --json 2>/dev/null)
          echo "$PACK" | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
            const files = (Array.isArray(data) ? data[0] : data).files.map(f => f.path);
            console.log('Tarball files:', files.length);
            console.log('Files:\n  ' + files.join('\n  '));

            const required = ['README.md', 'LICENSE', 'package.json'];
            const missing = required.filter(r => !files.some(f => f === r || f.endsWith('/' + r)));
            if (missing.length) { console.error('Missing required files:', missing); process.exit(1); }

            const banned = ['.env', 'node_modules', '.git'];
            const bad = files.filter(f => banned.some(b => f.includes(b)));
            if (bad.length) { console.error('Banned files in tarball:', bad); process.exit(1); }

            console.log('Tarball OK');
          "

      - name: Install smoke test
        run: |
          TARBALL=$(npm pack 2>/dev/null)
          mkdir -p /tmp/smoke-test
          cd /tmp/smoke-test
          npm init -y
          npm install "$GITHUB_WORKSPACE/$TARBALL"
          node -e "
            import('@mcptoolshop/mcpt-publishing/bin/mcpt-publishing.mjs')
              .then(() => { console.log('Smoke test: import OK'); })
              .catch((err) => { console.error('Smoke test: import FAILED —', err.message); process.exit(1); })
          "
          cd "$GITHUB_WORKSPACE"
          rm -f "$TARBALL"
          rm -rf /tmp/smoke-test

      - name: CLI smoke tests
        run: |
          node bin/mcpt-publishing.mjs --help
          node bin/mcpt-publishing.mjs --version
          node bin/mcpt-publishing.mjs providers --json
          node bin/mcpt-publishing.mjs init --dry-run

      - name: Security audit (production deps)
        id: security-audit
        continue-on-error: true
        run: |
          npm audit --omit=dev --json > /tmp/audit-result.json || true
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/audit-result.json', 'utf8');
            let result;
            try { result = JSON.parse(raw); } catch { console.error('audit JSON parse failed'); process.exit(1); }
            const meta = result.metadata || {};
            const vulns = meta.vulnerabilities || {};
            const counts = {
              critical: vulns.critical || 0,
              high: vulns.high || 0,
              moderate: vulns.moderate || 0,
              low: vulns.low || 0
            };
            console.log('Audit summary:', JSON.stringify(counts));
            if (counts.critical > 0 || counts.high > 0) {
              console.error('FAIL: critical=' + counts.critical + ' high=' + counts.high);
              process.exit(1);
            }
            console.log('OK: no critical/high vulnerabilities in production deps');
          "

      - name: Run tests
        run: npm test

      - name: Verify receipts (if any exist)
        # continue-on-error: legacy receipts written before the current schema
        # (receipt.schema.json v1.0.0) may fail validation. We surface failures
        # in the step summary below rather than hard-failing the job so that
        # existing receipts don't block CI while the backfill is in progress.
        continue-on-error: true
        id: verify-receipts
        run: |
          shopt -s nullglob
          RECEIPTS=(receipts/**/*.json)
          FAIL_COUNT=0
          if [ ${#RECEIPTS[@]} -gt 0 ]; then
            for r in "${RECEIPTS[@]}"; do
              echo "Verifying: $r"
              node bin/mcpt-publishing.mjs verify-receipt "$r" || FAIL_COUNT=$((FAIL_COUNT + 1))
            done
          else
            echo "No receipts to verify"
          fi
          echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"

      - name: Report receipt verification failures
        if: always() && steps.verify-receipts.outputs.fail_count != '' && steps.verify-receipts.outputs.fail_count != '0'
        run: |
          FAIL_COUNT="${{ steps.verify-receipts.outputs.fail_count }}"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Receipt Verification

          **$FAIL_COUNT receipt(s) failed schema validation.**

          These may be legacy receipts written before \`receipt.schema.json v1.0.0\`.
          Review \`receipts/\` and run \`node bin/mcpt-publishing.mjs verify-receipt <path>\` locally.
          EOF

  # ─── Weekly Audit (schedule + manual) ──────────────────────────────────────
  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Run audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node bin/mcpt-publishing.mjs audit

      - name: Write audit summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const reportPath = 'reports/latest.json';
            if (!fs.existsSync(reportPath)) {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Audit Summary\n\n> Report not found — audit may have failed.\n');
              process.exit(0);
            }
            const d = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const counts = d.counts || {};
            const red = counts.RED || 0;
            const yellow = counts.YELLOW || 0;
            const gray = counts.GRAY || 0;
            const generated = d.generated || '(unknown)';
            const lines = [
              '## Publishing Health Audit',
              '',
              \`**Generated:** \${generated}\`,
              '',
              \`| Status | Count |\`,
              \`|--------|-------|\`,
              \`| 🔴 RED | \${red} |\`,
              \`| 🟡 YELLOW | \${yellow} |\`,
              \`| ⚫ GRAY | \${gray} |\`,
              '',
            ];
            if (red > 0 || yellow > 0) {
              lines.push('> **Action required:** Review RED/YELLOW items in the report.');
              lines.push('');
            } else {
              lines.push('> All checks green — no RED or YELLOW items.');
              lines.push('');
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          "

      - name: Commit report
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest.md reports/latest.json receipts/audit/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update publishing health report [skip ci]"
          git push

      - name: Update pinned issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TITLE="Publishing Health"

          RED=$(node -e "const d=JSON.parse(require('fs').readFileSync('reports/latest.json','utf8')); process.stdout.write(String(d.counts.RED))")
          YELLOW=$(node -e "const d=JSON.parse(require('fs').readFileSync('reports/latest.json','utf8')); process.stdout.write(String(d.counts.YELLOW))")
          GRAY=$(node -e "const d=JSON.parse(require('fs').readFileSync('reports/latest.json','utf8')); process.stdout.write(String(d.counts.GRAY))")
          GENERATED=$(node -e "const d=JSON.parse(require('fs').readFileSync('reports/latest.json','utf8')); process.stdout.write(d.generated)")

          BODY=$(cat <<EOF
          ## Publishing Health — ${GENERATED}

          **RED: ${RED}** | **YELLOW: ${YELLOW}** | **GRAY: ${GRAY}**

          $(head -20 reports/latest.md | tail -15)

          ---
          [Full report](https://github.com/${REPO}/blob/main/reports/latest.md) | [JSON](https://github.com/${REPO}/blob/main/reports/latest.json)

          _Updated by [CI](https://github.com/${REPO}/actions/workflows/ci.yml)_
          EOF
          )

          ISSUE_NUM=$(gh issue list --repo "$REPO" --search "in:title ${TITLE}" --state open --json number --jq '.[0].number // empty')

          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" --repo "$REPO" --body "$BODY"
            echo "Updated issue #${ISSUE_NUM}"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --pin
            echo "Created and pinned new issue"
          fi

  # ─── Deploy Site to GitHub Pages (push to main + site/** changes) ──────────
  # Note: pages-build triggers on every push to main, not just site/** changes.
  # This is intentional — site builds are fast (~30s) and non-site changes may
  # update data files or schemas that the site consumes. The rebuild is cheap
  # and keeps the deployed site always in sync with main.
  pages-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist

  pages-deploy:
    needs: pages-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Pages deploy failure guidance
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Pages Deploy Failed

          **Common causes and fixes:**

          | Cause | Fix |
          |-------|-----|
          | GitHub Pages not enabled | Go to repo **Settings → Pages** and set source to **GitHub Actions** |
          | Permissions error | Ensure the workflow has `pages: write` and `id-token: write` permissions |
          | Artifact not uploaded | Check that `pages-build` uploaded an artifact — look for upload step errors |
          | Pages quota exceeded | Check [github.com/settings/billing](https://github.com/settings/billing) for storage limits |
          | Environment protection rules | Go to **Settings → Environments → github-pages** and check protection rules |

          **Manual recovery:**
          1. Fix the root cause above
          2. Re-run the failed job: `gh run rerun --failed`
          3. Or push an empty commit to trigger a fresh run: `git commit --allow-empty -m "fix: re-trigger pages deploy" && git push`

          EOF
