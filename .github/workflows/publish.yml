name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Run tests
        run: npm test

      - name: Verify tarball contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          # Ensure required files are present in the tarball
          grep -q "bin/" /tmp/pack-output.txt || (echo "ERROR: bin/ missing from tarball" && exit 1)
          grep -q "src/" /tmp/pack-output.txt || (echo "ERROR: src/ missing from tarball" && exit 1)
          grep -q "README.md" /tmp/pack-output.txt || (echo "ERROR: README.md missing from tarball" && exit 1)
          grep -q "CHANGELOG.md" /tmp/pack-output.txt || (echo "ERROR: CHANGELOG.md missing from tarball" && exit 1)
          grep -q "LICENSE" /tmp/pack-output.txt || (echo "ERROR: LICENSE missing from tarball" && exit 1)
          echo "Tarball contents verified."

      - name: CLI smoke test
        run: |
          node bin/mcpt-publishing.mjs --version
          node bin/mcpt-publishing.mjs --help
          echo "CLI smoke test passed."

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
